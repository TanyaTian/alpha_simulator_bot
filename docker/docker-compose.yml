version: '3.8'
services:
  alpha_simulator_bot:
    build:
      context: ../  # 构建上下文指向根目录
      dockerfile: Dockerfile  # 指定根目录下的 Dockerfile
    volumes:
      - ../logs:/app/logs  # 从 docker/ 到根目录下的 logs/
      - ../data:/app/data  # 从 docker/ 到根目录下的 data/
      - ../config:/config  # 新增挂载
    command: python main.py