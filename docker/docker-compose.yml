version: '3.8'
services:
  alpha_simulator_bot:
    build:
      context: ../  # 构建上下文指向根目录
      dockerfile: Dockerfile  # 指定根目录下的 Dockerfile
    volumes:
      - ../logs:/logs  # 从 docker/ 到根目录下的 logs/
      - ../data:/app/data  # 挂载到 /app/data 以匹配代码中的相对路径
      - ../config:/app/config  # 挂载到 /app/config 以匹配代码中的相对路径
      - ../output:/app/output  # 挂载到 /app/output 以匹配代码中的相对路径
    command: python main.py
    stop_grace_period: 60s  # 设置 60 秒超时
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 👈 让容器能通过这个名字访问宿主机
    ports:
      - "5001:5001"  # 👈 把容器的 5001 映射到宿主机的 5001